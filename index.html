<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preparedness MVP</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <!-- LANDING -->
    <div id="landing" class="screen active">
      <h1>Household Readiness Assessment</h1>
      <p>Understand your household continuity readiness in minutes.</p>
      <button onclick="start()">Start assessment</button>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="screen">

      <h2 id="question"></h2>

      <div id="options"></div>

      <div class="progress-wrapper">
  <div class="step-label">
    Step <span id="currentStep">1</span> / 4
  </div>

  <div class="progress">
    <div id="progressBar"></div>
  </div>
</div>

    </div>

    <!-- RESULT -->
    <div id="result" class="screen">

  <h1>Your Preparedness Score</h1>

  <div class="score-circle">
    <div class="score" id="score">0%</div>
  </div>

  <div id="breakdown"></div>

  <div class="recommendation-box">
    <h3>Top Priorities</h3>

    <ul id="recommendations"></ul>
  </div>

  <button onclick="location.reload()">Restart</button>

</div>

  <script src="app.js"></script>
</body>
</html>
