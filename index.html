<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preparedness SaaS</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

  <div id="landing" class="screen active">
    <h1>Household Readiness Assessment</h1>
    <p>Get your 7-day emergency plan in minutes.</p>
    <button onclick="start()">Start</button>
  </div>

  <div id="quiz" class="screen">
    <h2 id="question"></h2>
    <div id="options"></div>

    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <p>Step <span id="currentStep">1</span>/4</p>
  </div>

  <div id="result" class="screen">

    <h1>Your Score</h1>

    <div class="score-circle">
      <div class="score" id="score">0%</div>
    </div>

    <div class="paywall">
      <h3>Unlock full 7-day plan</h3>
      <p>Personalized emergency roadmap</p>

      <button onclick="buyFullReport()" class="cta">
        Unlock €0.99 / month
      </button>
    </div>
    <div id="breakdown"></div>

    <div id="plan"></div>

    <button onclick="start()">Restart</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
